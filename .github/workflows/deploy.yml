name: Deploy ATS Resume Extractor to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages into bundle folder
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pdfplumber==0.11.4 \
            docx2txt==0.8 \
            requests==2.32.3 \
            pytesseract==0.3.10 \
            Pillow==10.4.0 \
            azure-functions==1.21.3 \
            --target extractresume/.python_packages/lib/site-packages

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set WEBSITE_RUN_FROM_PACKAGE to 0
        run: |
          az functionapp config appsettings set \
            --name ats-resume-extractor \
            --resource-group ats-system-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Zip and deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"
          
          # Get publishing credentials
          CREDS=$(az functionapp deployment list-publishing-credentials \
            --name ats-resume-extractor \
            --resource-group ats-system-rg \
            --query '{u:publishingUserName,p:publishingPassword}' \
            -o json)
          
          PUB_USER=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['u'])")
          PUB_PASS=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['p'])")
          
          # Deploy via Kudu zip API
          curl -X POST \
            "https://ats-resume-extractor.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "$PUB_USER:$PUB_PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --max-time 300 \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Restart Function App
        run: |
          az functionapp restart \
            --name ats-resume-extractor \
            --resource-group ats-system-rg
          echo "✅ Deployed successfully!"
