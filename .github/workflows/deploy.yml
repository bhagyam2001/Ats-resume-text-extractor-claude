name: Deploy ATS Resume Extractor to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages into bundle folder
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pdfplumber==0.11.4 \
            docx2txt==0.8 \
            requests==2.32.3 \
            pytesseract==0.3.10 \
            Pillow==10.4.0 \
            azure-functions==1.21.3 \
            --target extractresume/.python_packages/lib/site-packages

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set WEBSITE_RUN_FROM_PACKAGE to 0
        run: |
          az functionapp config appsettings set \
            --name ats-resume-extractor \
            --resource-group ats-system-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE=0 \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Zip and deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"
          az functionapp deployment source config-zip \
            --name ats-resume-extractor \
            --resource-group ats-system-rg \
            --src deploy.zip

      - name: Restart Function App
        run: |
          az functionapp restart \
            --name ats-resume-extractor \
            --resource-group ats-system-rg
          echo "✅ Deployed successfully!"
